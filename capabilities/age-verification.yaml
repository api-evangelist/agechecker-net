name: Age Verification
description: "End-to-end age verification workflow for e-commerce businesses selling age-restricted products."
apisComposed:
  - agechecker-net-age-verification-api
tools:
  - name: verify-customer-age
    description: "Verify a customer's age before allowing purchase of age-restricted products. Returns pass/fail and whether photo ID upload is required."
    sharedTool: agechecker-net-age-verification-api/verify-age
  - name: check-verification-status
    description: "Check the status of a pending age verification session to determine if the customer has completed photo ID upload."
    sharedTool: agechecker-net-age-verification-api/get-verification-session
  - name: list-recent-verifications
    description: "List recent verification sessions to audit age verification compliance for regulatory reporting."
    sharedTool: agechecker-net-age-verification-api/list-verification-sessions
  - name: setup-verification-webhook
    description: "Configure webhook notifications to receive real-time alerts when age verification completes or fails."
    sharedTool: agechecker-net-age-verification-api/configure-webhook
personas:
  - compliance-officer
  - e-commerce-developer
