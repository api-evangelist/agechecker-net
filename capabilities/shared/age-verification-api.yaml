name: AgeChecker.Net Age Verification API
namespace: agechecker-net-age-verification-api
description: "Shared capability definitions for the AgeChecker.Net Age Verification API."
tools:
  - name: verify-age
    description: "Submit customer data for age verification. Returns pass/fail result and whether photo ID is required."
    operation: POST /verify
    parameters:
      - name: first_name
        description: "Customer first name."
        required: true
      - name: last_name
        description: "Customer last name."
        required: true
      - name: birth_date
        description: "Customer date of birth (YYYY-MM-DD)."
        required: true
      - name: address
        description: "Street address."
      - name: city
        description: "City."
      - name: state
        description: "State or province code."
      - name: zip
        description: "Postal/ZIP code."
      - name: email
        description: "Customer email address."
      - name: ip_address
        description: "Customer IP address."
      - name: minimum_age
        description: "Minimum age required."
  - name: get-verification-session
    description: "Retrieve the status and result of a verification session by session ID."
    operation: GET /sessions/{sessionId}
    parameters:
      - name: sessionId
        description: "Unique session identifier."
        required: true
  - name: list-verification-sessions
    description: "List verification sessions with optional date range and result filtering."
    operation: GET /sessions
    parameters:
      - name: from
        description: "Start timestamp for filtering."
      - name: to
        description: "End timestamp for filtering."
      - name: result
        description: "Filter by result (pass, fail, pending)."
      - name: limit
        description: "Maximum results per page."
      - name: offset
        description: "Pagination offset."
  - name: configure-webhook
    description: "Configure a webhook URL to receive verification result notifications."
    operation: POST /webhook
    parameters:
      - name: url
        description: "Webhook URL."
        required: true
      - name: events
        description: "List of event types to receive."
      - name: secret
        description: "Shared secret for signature verification."
