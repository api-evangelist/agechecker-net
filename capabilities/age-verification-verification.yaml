naftiko: 1.0.0-alpha2
info:
  label: AgeChecker.Net Age Verification API — Verification
  description: 'AgeChecker.Net Age Verification API — Verification. 1 operations. Lead operation: AgeChecker.Net Verify Age.
    Self-contained Naftiko capability covering one Agechecker Net business surface.'
  tags:
  - Agechecker Net
  - Verification
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGECHECKER_NET_API_KEY: AGECHECKER_NET_API_KEY
capability:
  consumes:
  - type: http
    namespace: age-verification-verification
    baseUri: https://api.agechecker.net/v1
    description: AgeChecker.Net Age Verification API — Verification business capability. Self-contained, no shared references.
    resources:
    - name: verify
      path: /verify
      operations:
      - name: verifyage
        method: POST
        description: AgeChecker.Net Verify Age
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.AGECHECKER_NET_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: age-verification-verification-rest
    port: 8080
    description: REST adapter for AgeChecker.Net Age Verification API — Verification. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/verify
      name: verify
      description: REST surface for verify.
      operations:
      - method: POST
        name: verifyage
        description: AgeChecker.Net Verify Age
        call: age-verification-verification.verifyage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: age-verification-verification-mcp
    port: 9090
    transport: http
    description: MCP adapter for AgeChecker.Net Age Verification API — Verification. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: agechecker-net-verify-age
      description: AgeChecker.Net Verify Age
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: age-verification-verification.verifyage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
